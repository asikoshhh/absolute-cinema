<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Cinema - Фильм</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎬 Absolute Cinema</h1>
        <p>Выбери фильм и забронируй билет</p>
    </header>

    <main class="movie-page">
        <div class="movie-container">
            <div class="movie-poster-large">
                <div class="poster-placeholder" id="movie-poster-icon">🎬</div>
            </div>
            
            <div class="movie-details">
                <h1 class="movie-title-large" id="movie-title">Загрузка...</h1>
                
                <div class="movie-meta" id="movie-meta">
                    <span class="rating">⭐ --</span>
                    <span>----</span>
                    <span>----</span>
                    <span>-- ч -- мин</span>
                    <span>--+</span>
                </div>
                
                <div class="movie-genres" id="movie-genres">
                    <span class="genre-tag">---</span>
                </div>
                
                <div class="movie-description">
                    <h3>О фильме</h3>
                    <p id="movie-description">Загрузка описания...</p>
                </div>
                
                <a href="index.html" class="back-link">← Назад к афише</a>
            </div>
        </div>

        <div class="sessions-section">
            <h2>Расписание сеансов</h2>
            <div class="sessions-list" id="sessions-list">
                <div class="session-card">Загрузка...</div>
            </div>
        </div>
    </main>

    <script src="movie-script.js"></script>
</body>
</html>
